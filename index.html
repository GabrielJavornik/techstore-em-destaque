<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechStore — Em Destaque</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28;
      --accent: #7c6cfa; --accent2: #fa6c9f; --text: #f0f0f8;
      --muted: #7a7a9a; --border: rgba(255,255,255,0.07);
      --card-bg: #16161f; --success: #4ade80; --warning: #fbbf24; --error: #f87171;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 4rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px); z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    nav { display: flex; gap: 2.5rem; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--text); position: relative; }
    nav a.active::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 2px; background: var(--accent); border-radius: 2px; }

    .hero { padding: 6rem 4rem 3rem; position: relative; overflow: hidden; }
    .hero-glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(124,108,250,0.12) 0%, transparent 70%); top: -200px; left: -100px; pointer-events: none; }
    .hero-glow2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(250,108,159,0.08) 0%, transparent 70%); top: 100px; right: 0; pointer-events: none; }
    .hero-label { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(124,108,250,0.1); border: 1px solid rgba(124,108,250,0.25); color: var(--accent); font-size: 0.72rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 0.35rem 1rem; border-radius: 999px; margin-bottom: 1.5rem; }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 800; line-height: 1.05; letter-spacing: -2px; margin-bottom: 1.2rem; }
    .hero h1 em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p { color: var(--muted); font-size: 1.05rem; max-width: 480px; line-height: 1.65; }

    #apiStatus { display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1.5rem; font-size: 0.8rem; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 8px; }
    #apiStatus .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; flex-shrink: 0; }
    #apiStatus.loading .dot  { background: var(--warning); animation: pulse 1s infinite; }
    #apiStatus.retrying .dot { background: var(--warning); animation: pulse 0.5s infinite; }
    #apiStatus.success .dot  { background: var(--success); }
    #apiStatus.error .dot    { background: var(--error); }
    #apiStatus.mock .dot     { background: var(--accent); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .info-banner { margin: 0 4rem 1.5rem; border-radius: 12px; padding: 1rem 1.5rem; display: none; align-items: flex-start; gap: 0.75rem; font-size: 0.88rem; line-height: 1.5; }
    .info-banner.warn { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); color: var(--warning); }
    .info-banner.err  { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); color: var(--error); }

    .filters-section { padding: 2rem 4rem; display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; }
    .filter-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
    .search-box { position: relative; flex: 1; min-width: 220px; max-width: 340px; }
    .search-box::before { content: '⌕'; position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1.1rem; pointer-events: none; }
    .search-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.65rem 1rem 0.65rem 2.5rem; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .search-box input::placeholder { color: var(--muted); }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,108,250,0.12); }
    .price-filter { display: flex; align-items: center; gap: 0.6rem; }
    .price-filter input[type="range"] { -webkit-appearance: none; width: 160px; height: 4px; background: var(--surface2); border-radius: 2px; outline: none; cursor: pointer; }
    .price-filter input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 0 3px rgba(124,108,250,0.2); }
    .price-value { font-size: 0.82rem; color: var(--accent); font-weight: 600; min-width: 75px; }
    .filter-reset { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.5rem 1rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
    .filter-reset:hover { border-color: var(--accent); color: var(--accent); }

    .results-info { padding: 0 4rem 1rem; font-size: 0.82rem; color: var(--muted); }
    .results-info strong { color: var(--text); }

    /* ─── GRID (id="featuredProducts" igual ao exercício) ─── */
    #featuredProducts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 0 4rem 6rem;
    }

    /* ─── CARD ─── */
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 1.8rem; position: relative; overflow: hidden; transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s; animation: fadeUp 0.4s ease both; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.35); border-color: rgba(124,108,250,0.3); }
    .card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(124,108,250,0.04) 0%, transparent 60%); pointer-events: none; }
    .card-badge { display: inline-flex; align-items: center; gap: 0.35rem; background: rgba(124,108,250,0.12); border: 1px solid rgba(124,108,250,0.2); color: var(--accent); font-size: 0.62rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 0.25rem 0.7rem; border-radius: 999px; margin-bottom: 1.2rem; }
    .card-id { position: absolute; top: 1.2rem; right: 1.5rem; font-size: 0.7rem; color: var(--muted); }

    /* ─── cardTitle e cardPrice — nomes iguais ao exercício ─── */
    .cardTitle { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 0.6rem; line-height: 1.2; }
    .cardPrice { font-size: 1.55rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1.4rem; font-family: 'Syne', sans-serif; }

    .card-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.72rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; color: white; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
    .card-btn:hover  { opacity: 0.85; transform: scale(1.02); }
    .card-btn:active { transform: scale(0.97); }

    .empty-state { grid-column: 1 / -1; text-align: center; padding: 5rem 2rem; color: var(--muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1.4rem; color: var(--text); margin-bottom: 0.5rem; }

    .skeleton-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 1.8rem; animation: fadeUp 0.4s ease both; }
    .skeleton-line { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; border-radius: 6px; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    footer { border-top: 1px solid var(--border); padding: 2rem 4rem; display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 0.8rem; }

    @media (max-width: 768px) {
      header { padding: 1rem 1.5rem; } nav { display: none; }
      .hero, .filters-section, #featuredProducts, .results-info, .info-banner { padding-left: 1.5rem; padding-right: 1.5rem; }
      footer { padding: 1.5rem; flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">TechStore</div>
    <nav>
      <a href="#">Início</a>
      <a href="#" class="active">Em Destaque</a>
      <a href="#">Categorias</a>
      <a href="#">Sobre</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-glow"></div>
    <div class="hero-glow2"></div>
    <div class="hero-label">★ Seleção Especial</div>
    <h1>Produtos<br><em>Em Destaque</em></h1>
    <p>Os melhores produtos selecionados para você. Qualidade garantida com os melhores preços do mercado.</p>
    <div id="apiStatus">
      <div class="dot"></div>
      <span id="apiStatusText">Aguardando...</span>
    </div>
  </section>

  <div class="info-banner" id="infoBanner">
    <span id="bannerMsg"></span>
  </div>

  <div class="filters-section">
    <span class="filter-label">Filtrar:</span>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar por nome..." />
    </div>
    <div class="price-filter">
      <span class="filter-label">Até:</span>
      <input type="range" id="priceRange" min="0" max="10000" step="100" value="10000" />
      <span class="price-value" id="priceLabel">R$ 10.000</span>
    </div>
    <button class="filter-reset" onclick="resetFilters()">✕ Limpar</button>
  </div>

  <div class="results-info" id="resultsInfo"></div>

  <!-- id="featuredProducts" — exatamente como no exercício (Página 3) -->
  <div id="featuredProducts"></div>

  <footer>
    <span>© 2026 TechStore — URI Programação Web</span>
    <span>Prof. Douglas Tagliari</span>
  </footer>

  <script>
    // ══════════════════════════════════════════
    // ARRAY MOCK "PROBLEMÁTICO" — Página 2 do exercício
    // ══════════════════════════════════════════
    let featuredProducts = [
      { id: 101, title: "Notebook Gamer",   price: 4500,      highlight: true   },
      { id: 102, title: "Mouse RGB",        price: "200",     highlight: "true" },
      { id: 103, title: null,               price: 150,       highlight: true   },
      { id: 104,                            price: 900,       highlight: false  },
      { id: 105, title: "Monitor 4K",       price: -3000,     highlight: true   },
      { id: 106, title: "Teclado Mecânico", price: undefined, highlight: true   },
    ];

    // Estado global dos produtos prontos para exibição
    let allProducts = [];

    // ══════════════════════════════════════════
    // renderProducts — Página 3 do exercício
    // ══════════════════════════════════════════
    function renderProducts(products) {
      const container = document.getElementById("featuredProducts");

      if (!products || products.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <h3>Nenhum produto encontrado</h3>
            <p>Tente ajustar os filtros de busca.</p>
          </div>`;
        updateResultsInfo(0);
        return;
      }

      let html = "";
      products.forEach((p, i) => {
        html += `
          <div class="card" style="animation-delay:${i * 0.07}s">
            <span class="card-id">#${p.id}</span>
            <div class="card-badge">★ Destaque</div>
            <h3 class="cardTitle">${p.title}</h3>
            <p class="cardPrice">R$ ${p.price}</p>
            <button class="card-btn" onclick="addToCart(${p.id})">
              🛒 Adicionar ao Carrinho
            </button>
          </div>`;
      });

      container.innerHTML = html;
      updateResultsInfo(products.length);
    }

    // ══════════════════════════════════════════
    // normalizeProduct — Página 4 do exercício
    // ══════════════════════════════════════════
    function normalizeProduct(p) {
      return {
        id:        p.id,
        title:     p.title || "Sem nome",
        price:     Number(p.price),
        highlight: p.highlight === true || p.highlight === "true"
      };
    }

    // ══════════════════════════════════════════
    // validateProduct — Página 4 do exercício
    // ══════════════════════════════════════════
    function validateProduct(p) {
      return (
        p.price > 0
      );
    }

    // ══════════════════════════════════════════
    // prepareProducts — Página 4 do exercício
    // ══════════════════════════════════════════
    function prepareProducts(data) {
      return data
        .map(normalizeProduct)
        .filter(validateProduct)
        .filter(p => p.highlight);
    }

    // ══════════════════════════════════════════
    // fetchWithRetry — Página 5 do exercício
    // 5 novas tentativas em caso de ERRO
    // ══════════════════════════════════════════
    async function fetchWithRetry(url, retries = 5) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          setStatus('retrying', attempt === 1
            ? 'Conectando à API...'
            : `Tentativa ${attempt} de ${retries}...`
          );

          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const data = await response.json();
          return data;

        } catch (err) {
          console.warn(`[TechStore] Tentativa ${attempt}/${retries} falhou:`, err.message);
          if (attempt < retries) {
            await sleep(3000); // aguarda 3s antes de tentar de novo
          } else {
            throw err; // esgotou as tentativas
          }
        }
      }
    }

    // ══════════════════════════════════════════
    // INICIALIZAÇÃO PRINCIPAL
    // ══════════════════════════════════════════
    async function init() {
      renderSkeleton(4);

      const API_URL = 'https://backend-node-nmze.onrender.com/featured';

      try {
        // Página 5: substituir o array manual pela API
        const response = await fetchWithRetry(API_URL);
        // A API retorna { items: [...] } — precisa extrair o array
        const rawData = response.items || response;
        // Usa o mesmo prepareProducts do exercício (normaliza + valida + filtra highlight)
        allProducts = prepareProducts(rawData);

        setStatus('success', `API conectada — ${allProducts.length} produto(s) recebido(s)`);

      } catch (err) {
        // Após 5 tentativas falhas → usa mock do exercício
        console.error('[TechStore] API indisponível. Usando dados mock.', err);
        setStatus('error', 'API indisponível — usando dados mock do exercício');
        showBanner('err',
          '⚠️ Não foi possível carregar da API após 5 tentativas. Exibindo dados mock.'
        );
        // Usa o prepareProducts do exercício (com filtro de highlight) para o mock
        allProducts = prepareProducts(featuredProducts);
      }

      renderProducts(allProducts);
      setupFilters();
    }

    // ══════════════════════════════════════════
    // FILTROS — por nome e por preço
    // ══════════════════════════════════════════
    function setupFilters() {
      const searchInput = document.getElementById('searchInput');
      const priceRange  = document.getElementById('priceRange');
      const priceLabel  = document.getElementById('priceLabel');

      if (allProducts.length > 0) {
        const maxPrice = Math.ceil(Math.max(...allProducts.map(p => p.price)) / 100) * 100;
        priceRange.max   = maxPrice;
        priceRange.value = maxPrice;
        priceLabel.textContent = `R$ ${maxPrice.toLocaleString('pt-BR')}`;
      }

      searchInput.addEventListener('input', applyFilters);
      priceRange.addEventListener('input', () => {
        priceLabel.textContent = `R$ ${Number(priceRange.value).toLocaleString('pt-BR')}`;
        applyFilters();
      });
    }

    function applyFilters() {
      const query    = document.getElementById('searchInput').value.trim().toLowerCase();
      const maxPrice = Number(document.getElementById('priceRange').value);

      const filtered = allProducts.filter(p =>
        p.title.toLowerCase().includes(query) && p.price <= maxPrice
      );
      renderProducts(filtered);
    }

    function resetFilters() {
      const searchInput = document.getElementById('searchInput');
      const priceRange  = document.getElementById('priceRange');
      const priceLabel  = document.getElementById('priceLabel');
      searchInput.value      = '';
      priceRange.value       = priceRange.max;
      priceLabel.textContent = `R$ ${Number(priceRange.max).toLocaleString('pt-BR')}`;
      renderProducts(allProducts);
    }

    // ══════════════════════════════════════════
    // UTILITÁRIOS
    // ══════════════════════════════════════════
    function renderSkeleton(count = 4) {
      const container = document.getElementById("featuredProducts");
      let html = "";
      for (let i = 0; i < count; i++) {
        html += `
          <div class="skeleton-card" style="animation-delay:${i * 0.07}s">
            <div class="skeleton-line" style="height:18px;width:55%;margin-bottom:1.1rem"></div>
            <div class="skeleton-line" style="height:26px;width:80%;margin-bottom:.7rem"></div>
            <div class="skeleton-line" style="height:34px;width:45%;margin-bottom:1.6rem"></div>
            <div class="skeleton-line" style="height:42px;width:100%"></div>
          </div>`;
      }
      container.innerHTML = html;
    }

    function setStatus(type, message) {
      document.getElementById('apiStatus').className       = type;
      document.getElementById('apiStatusText').textContent = message;
    }

    function showBanner(type, msg) {
      const banner = document.getElementById('infoBanner');
      document.getElementById('bannerMsg').textContent = msg;
      banner.className = `info-banner ${type}`;
      banner.style.display = 'flex';
    }

    function updateResultsInfo(count) {
      document.getElementById('resultsInfo').innerHTML = count > 0
        ? `Exibindo <strong>${count}</strong> produto${count !== 1 ? 's' : ''} em destaque`
        : 'Nenhum produto corresponde aos filtros aplicados.';
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function addToCart(id) {
      const p = allProducts.find(x => x.id === id);
      if (p) alert(`✅ "${p.title}" adicionado ao carrinho!\nPreço: R$ ${p.price.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`);
    }

    // START
    init();
  </script>
</body>
</html>
